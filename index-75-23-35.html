// Searchable Dropdown Component
const SearchableDropdown = ({ 
  options = [], 
  value, 
  onChange, 
  placeholder = "Select...", 
  displayField = "name",
  valueField = "name",
  className = ""
}) => {
  const [isOpen, setIsOpen] = useState(false);
  const [searchTerm, setSearchTerm] = useState('');
  const [filteredProducts, setFilteredProducts] = useState(options);

  useEffect(() => {
    // Sort options alphabetically and filter by search term
    const sorted = [...options].sort((a, b) => {
      const aName = a[displayField] || '';
      const bName = b[displayField] || '';
      return aName.localeCompare(bName);
    });
    
    const filtered = sorted.filter(option => {
      const optionText = option[displayField] || '';
      return optionText.toLowerCase().includes(searchTerm.toLowerCase());
    });
    
   setFilteredProducts(filtered);
  }, [options, searchTerm, displayField]);

  const handleSelect = (option) => {
    onChange(option[valueField]);
    setIsOpen(false);
    setSearchTerm('');
  };

  const selectedOption = options.find(opt => opt[valueField] === value);

  return (
    <div className="relative">
      <div
        className={`w-full px-3 py-2 border border-gray-300 rounded-lg cursor-pointer bg-white ${className}`}
        onClick={() => setIsOpen(!isOpen)}
      >
        <div className="flex items-center justify-between">
          <span className={value ? 'text-gray-900' : 'text-gray-500'}>
            {selectedOption ? selectedOption[displayField] : placeholder}
          </span>
          <ChevronDown size={16} className={`transform transition-transform ${isOpen ? 'rotate-180' : ''}`} />
        </div>
      </div>
      
      {isOpen && (
        <div className="absolute z-50 w-full mt-1 bg-white border border-gray-300 rounded-lg shadow-lg max-h-60 overflow-hidden">
          <div className="p-2 border-b">
            <input
              type="text"
              value={searchTerm}
              onChange={(e) => setSearchTerm(e.target.value)}
              placeholder="Type to search..."
              className="w-full px-2 py-1 border border-gray-300 rounded text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
              autoFocus
            />
          </div>
          <div className="max-h-48 overflow-y-auto">
       {filteredProducts.length === 0 ? (
  <div className="px-3 py-2 text-gray-500 text-sm">No options found</div>
) : (
  filteredProducts.map((option, index) => (
    <div
      key={option.id || index}
      className="px-3 py-2 hover:bg-blue-50 cursor-pointer text-sm border-b border-gray-100 last:border-b-0"
      onClick={() => handleSelect(option)}
    >
      {option[displayField]}
    </div>
  ))
)}
          </div>
        </div>
      )}
    </div>
  );
};

const SageProductSelector = ({ jobType, selectedProduct, onSelect, products }) => {
  const [loading, setLoading] = useState(true);
  const [searchTerm, setSearchTerm] = useState('');
  const [showPostcodePrices, setShowPostcodePrices] = useState(false);
const [postcodeSearch, setPostcodeSearch] = useState('');
const [postcodePrices, setPostcodePrices] = useState([]);
const [loadingPrices, setLoadingPrices] = useState(false);
const [postcodeOptions, setPostcodeOptions] = useState([]);

  // Smart filtering based on job type and waste type
const getFilteredProducts = () => {
  if (products.length === 0) {
    return [];
  }

  let filtered = products;

  // Filter by search term only
  if (searchTerm) {
    filtered = filtered.filter(p => {
      const searchLower = searchTerm.toLowerCase();
      
      // Safe string conversion - handle null/undefined values
      const nameLower = (p.name || '').toString().toLowerCase();
      const descLower = (p.description || '').toString().toLowerCase();
      const codeLower = (p.item_code || '').toString().toLowerCase();
      
      return nameLower.includes(searchLower) || 
             descLower.includes(searchLower) || 
             codeLower.includes(searchLower) ||
             nameLower.replace(/\s+/g, '').includes(searchLower) ||
             searchLower.split(' ').every(word => nameLower.includes(word));
    });
  }

// Sort alphabetically by name
  return filtered.sort((a, b) => {
    const aName = (a.name || '').toString();
    const bName = (b.name || '').toString();
    return aName.localeCompare(bName);
  });
};

const searchPostcodePrices = async () => {
  if (!postcodeSearch) {
    alert('Please enter a postcode');
    return;
  }
  
  setLoadingPrices(true);
  try {
    const { data, error } = await window.supabase
      .from('jobs')
      .select('*')  // Get ALL fields so we can see what's available
      .eq('site_postcode', postcodeSearch.toUpperCase().trim())
      .order('created_at', { ascending: false });
    
    if (error) throw error;
    
    console.log('Full job data:', data); // Check what fields have actual prices
    
    if (data && data.length > 0) {
      const productsMap = new Map();
      
      data.forEach(job => {
        if (job.sage_line_items) {
          const lineItems = typeof job.sage_line_items === 'string' 
            ? JSON.parse(job.sage_line_items) 
            : job.sage_line_items;
          
        lineItems.forEach(item => {
  const key = `${item.product_name}_${item.description || ''}`;
  if (!productsMap.has(key)) {
    productsMap.set(key, []);
  }
  
  // Debug log to verify we're getting the right data
  console.log('Item customer_price:', item.customer_price);
  console.log('Item supplier_price:', item.supplier_price);
  
  productsMap.get(key).push({
    job_number: job.job_number,
    customer_name: job.customer_name,
    product_name: item.product_name || item.description,
    description: item.description || '',
    quantity: item.quantity || 1,
    // Use the CORRECT field names and parse the STRING to number
    unit_price: parseFloat(item.customer_price) || 0,
    cost_price: parseFloat(item.supplier_price) || 0,
    date: job.created_at
  });
});
        }
      });
      
      setPostcodePrices(Array.from(productsMap.entries()));
    } else {
      setPostcodePrices([]);
      alert('No jobs found for postcode: ' + postcodeSearch);
    }
  } catch (error) {
    console.error('Error searching postcode prices:', error);
    alert('Error searching prices');
  } finally {
    setLoadingPrices(false);
  }
};

const EWCPicker = ({ value, onChange }) => {
  const [open, setOpen] = useState(false);
  const [search, setSearch] = useState('');
  const [tab, setTab] = useState('common');
  const btnRef = React.useRef(null);
  const [pos, setPos] = React.useState({top:0,left:0,width:0});

  const COMMON_CODES = ['17 09 04','17 01 07','17 05 04','17 08 02','20 03 01','17 02 01','17 04 05','17 06 04','20 03 07','17 03 02'];

  const filtered = EWC_CODES.filter(e => {
    if (!search) return tab === 'common' ? COMMON_CODES.includes(e.code) : true;
    const q = search.toLowerCase();
    return e.code.includes(q) || e.desc.toLowerCase().includes(q) || e.keywords.includes(q);
  }).slice(0, 50);

  const selected = EWC_CODES.find(e => e.code === value);

  const openDropdown = () => {
    if (btnRef.current) {
      const rect = btnRef.current.getBoundingClientRect();
      setPos({ top: rect.bottom + window.scrollY + 4, left: rect.left + window.scrollX, width: Math.max(rect.width, 380) });

  return (
    <div className="relative">
      <div className="flex gap-2" ref={btnRef}>
        <input
          type="text"
          className="flex-1 px-3 py-2 border border-gray-300 rounded-lg text-sm"
          value={value}
          onChange={e => onChange(e.target.value)}
          placeholder="e.g. 17 09 04"
        />
        <button type="button" onClick={openDropdown}
          className="px-3 py-2 bg-green-700 text-white rounded-lg text-xs font-medium hover:bg-green-800 whitespace-nowrap">
          Browse codes
        </button>
      </div>
      {selected && (
        <div className={`mt-1 text-xs px-2 py-1 rounded flex items-center gap-1 ${selected.hazardous ? 'bg-red-50 text-red-700 border border-red-200' : 'bg-green-50 text-green-700 border border-green-200'}`}>
          {selected.hazardous ? '⚠️ HAZARDOUS — ' : '✅ Non-hazardous — '}{selected.desc}

      )}
      {open && <div className="fixed inset-0" style={{zIndex:9998}} onClick={() => { setOpen(false); setSearch(''); }} />}
      {open && (
        <div
          style={{ position:'fixed', top: pos.top, left: pos.left, width: pos.width, zIndex: 9999 }}
          className="bg-white border border-gray-200 rounded-xl shadow-2xl flex flex-col"
          onClick={e => e.stopPropagation()}
        >
          <div className="p-3 border-b border-gray-100">
            <input autoFocus type="text" placeholder="Search by keyword, waste type or code..." value={search}
              onChange={e => setSearch(e.target.value)}

            {!search && (
              <div className="flex gap-2 mt-2">

          <div className="overflow-y-auto" style={{maxHeight:'320px'}}>

              <button key={e.code} type="button"

      {open && <div className="fixed inset-0 z-[9998]" onClick={() => { setOpen(false); setSearch(''); }} />}
    </div>
  );
};

// Refresh broker details from Supabase on form open (fixes race condition with localStorage)
useEffect(() => {
  const now = new Date();
  const todayStr = now.toISOString().split('T')[0];
  const timeStr = now.toTimeString().slice(0,5);
  const autoWtnNumber = 'WTN-' + (job?.jobNumber || '');
  const autoDate = job?.collectionDate || job?.jobDate || todayStr;

  // Always update WTN number to match current job, and refresh date/time if blank
  // Also always re-derive recipient email from customer record (never use stale saved email)
  const matchedCust = customers?.find(c => (c.name || c.companyName) === job?.customerName);
  const freshRecipientEmail = matchedCust?.email || '';
  setWtnFields(prev => ({
    ...prev,
    wtnNumber: autoWtnNumber,
    transferDate: prev.transferDate || autoDate,
    transferTime: prev.transferTime || timeStr,
    recipientEmail: freshRecipientEmail || prev.recipientEmail || '',
    recipientEmailSource: (freshRecipientEmail || prev.recipientEmail) ? 'customer-record' : 'manual',
  }));

  (async () => {
    try {
      const { data } = await window.supabase.from('company_settings').select('*');
      if (!data) return;
      const get = (name) => data.find(s => s.setting_name === name)?.setting_value || '';

      }));
      if (addr) localStorage.setItem('companyAddress', addr);
      if (cbdu) localStorage.setItem('carrierReg', cbdu);
      if (name) localStorage.setItem('companyName', name);
    } catch(e) {}
  })();
  // Refresh supplier CBDU if blank
  if (job?.supplierName) {
    (async () => {
      try {
        const { data } = await window.supabase
          .from('suppliers').select('*').eq('name', job.supplierName).single();
        if (data) {
          const cbdu = data.waste_carrier_license || data.wasteCarrierLicense || '';

            ...prev,
            transfereeCarrierReg: prev.transfereeCarrierReg || cbdu,
            transfereeAddress: prev.transfereeAddress || addr,
          }));
        }
      } catch(e) {}
    })();
  }
}, []);

   const handleSubmit = async () => {
  // Define sageProductData at the very beginning - it's used in multiple places
  const sageProductData = (formData.lineItems || []).map(item => ({
    sage_id: item.sage_id,
    product_name: item.product_name,
    description: item.description,
    item_code: item.item_code,
    type: item.type,
    quantity: item.quantity || 1,
    unit_price: item.customer_price || item.unit_price || 0,
    cost_price: item.supplier_price || item.cost_price || 0,
    sales_ledger_account: item.sales_ledger_account || '4010',
    nominal_code: item.nominal_code || '4010',
    tax_code: item.tax_code || 'T1',
    vat_rate: formData.vatRate || 20
  }));

  if (isEvent) {
  // Handle event submission
  const startDate = new Date(formData.jobDate);
  const endDate = new Date(formData.eventEndDate || formData.jobDate);
  
  // Create an event for each day in the range
  const events = [];
  const currentDate = new Date(startDate);
  
  while (currentDate <= endDate) {
   const eventData = {
  jobNumber: `EVENT-${Date.now()}-${currentDate.getDate()}`, // Use jobNumber (camelCase)
  customerName: formData.eventTitle,
  jobType: formData.eventType,
  jobDate: currentDate.toISOString().split('T')[0],
  status: 'EVENT',
  isEvent: true,  // Use camelCase
  eventType: formData.eventType,
  eventTitle: formData.eventTitle,
  eventEndDate: formData.eventEndDate,
  staffMember: formData.staffMember,
  siteAddress1: formData.siteAddress1,
  notes: formData.notes,
  supplierName: 'N/A',
  quantity: 1,
  customerFinalPrice: 0,
  supplierFinalPrice: 0,
  isCompleted: false,
  isCancelled: false
};
    
    events.push(eventData);
    currentDate.setDate(currentDate.getDate() + 1);
  }
  
  // Save all event days
  events.forEach(event => onSave(event));
  
  alert(`Event added to calendar for ${events.length} day(s)!`);
  onClose();
  return;
}

  // Check if this is a skip/RoRo with quantity > 1
  if ((formData.jobType === 'Skip Hire' || formData.jobType === 'Roll-on Roll-off') && formData.quantity > 1) {
    const jobs = [];
    
    for (let i = 0; i < formData.quantity; i++) {
      // Get a unique job number for EACH job
      const { data: jobNumber, error: jobNumError } = await supabase
        .rpc('get_next_job_number');
      
      if (jobNumError) {
        console.error('Error getting job number:', jobNumError);
        alert('Error generating job number. Please try again.');
        return;
      }
      
      const jobId = jobNumber;  // Each job gets its own unique number
      const newJob = {
        ...formData,
        id: jobId,
        jobNumber: jobNumber,  // Use the unique number from Supabase
        quantity: 1,
        customerFinalPrice: formData.customerUnitPrice,
        supplierFinalPrice: formData.supplierUnitPrice,
        grossProfit: formData.customerUnitPrice - formData.supplierUnitPrice,
        profitMargin: formData.customerUnitPrice > 0 ?
          ((formData.customerUnitPrice - formData.supplierUnitPrice) / formData.customerUnitPrice) * 100 : 0,
        jobValue: formData.customerUnitPrice,
        parentJobId: i === 0 ? null : jobs[0].id,
        linkedJobs: [],
        collectionDate: formData.collectionDate,
        sage_product_data: sageProductData,
        sage_line_items: formData.lineItems
      };
      jobs.push(newJob);
    }
    // Link jobs together
    jobs[0].linkedJobs = jobs.slice(1).map(j => j.id);
    jobs.forEach(job => onSave(job));
  } else {
    // For single job creation/editing
    let newJobNumber = job?.jobNumber;  // Keep existing number if editing

    if (!newJobNumber) {
      // Only get new number if creating a new job
      const { data: jobNum, error: jobNumError } = await supabase
        .rpc('get_next_job_number');
      
      if (jobNumError) {
        console.error('Error getting job number:', jobNumError);
        alert('Error generating job number. Please try again.');
        return;
      }
      newJobNumber = jobNum;
    }
    
    const newJob = {
      ...formData,
      jobNumber: newJobNumber,
      grossProfit: formData.customerFinalPrice - formData.supplierFinalPrice,
      profitMargin: formData.customerFinalPrice > 0 ?
        ((formData.customerFinalPrice - formData.supplierFinalPrice) / formData.customerFinalPrice) * 100 : 0,
      jobValue: formData.customerFinalPrice,
      parentJobId: null,
      linkedJobs: [],
      sage_product_data: sageProductData,
      sage_line_items: formData.lineItems
    };
    
    // Clean up empty date fields to prevent database errors
    if (!newJob.collectionDate || newJob.collectionDate === '') {
      delete newJob.collectionDate;
    }
    if (!newJob.deliveryDate || newJob.deliveryDate === '') {
      delete newJob.deliveryDate;
    }
    if (!newJob.jobDate || newJob.jobDate === '') {
      newJob.jobDate = new Date().toISOString().split('T')[0];
    }
    
    // Only include ID if we're updating an existing job (not creating new/duplicate)
    // Check if formData has an id - if not, it's a new job
    if (job?.id && formData.id) {
      newJob.id = job.id;
    }

    // Bundle WTN fields so they persist to Supabase
    newJob.wtnData = wtnFields;
    
    onSave(newJob);
  }
};

  // Helper to filter jobs by date range
  const filterJobsByDate = (jobsList) => {
    if (dateRange === 'all') return jobsList;
    
    const now = new Date();
    const today = new Date(now.setHours(0, 0, 0, 0));
    
    return jobsList.filter(job => {
      const jobDate = new Date(job.jobDate);
      
      switch(dateRange) {
        case 'day':
          return jobDate >= today;
        case 'week':
          const weekAgo = new Date(today);
          weekAgo.setDate(weekAgo.getDate() - 7);
          return jobDate >= weekAgo;
        case 'month':
          const monthAgo = new Date(today);
          monthAgo.setMonth(monthAgo.getMonth() - 1);
          return jobDate >= monthAgo;
        case 'year':
          const yearAgo = new Date(today);
          yearAgo.setFullYear(yearAgo.getFullYear() - 1);
          return jobDate >= yearAgo;
        case 'custom':
          if (startDate && endDate) {
            return jobDate >= new Date(startDate) && jobDate <= new Date(endDate);
          }
          return true;
        default:
          return true;
      }
    });
  };

    let revenue = 0;
    let cost = 0;
    
    if (job.lineItems && Array.isArray(job.lineItems) && job.lineItems.length > 0) {
      job.lineItems.forEach(item => {
        const quantity = parseFloat(item.quantity) || 0;
        const customerPrice = parseFloat(item.customer_price) || 0;
        const supplierPrice = parseFloat(item.supplier_price) || 0;
        
        revenue += quantity * customerPrice;
        cost += quantity * supplierPrice;
      });
    }
    
    if (revenue === 0 && !job.lineItems) {
      const quantity = parseFloat(job.quantity) || 1;
      revenue = (parseFloat(job.customerUnitPrice) || parseFloat(job.customerFinalPrice) || 0) * quantity;
      cost = (parseFloat(job.supplierUnitPrice) || parseFloat(job.supplierFinalPrice) || 0) * quantity;
    }
    
    const profit = revenue - cost;
    const marginPercent = revenue > 0 ? (profit / revenue) * 100 : 0;
    
    return { revenue, cost, profit, marginPercent };

    const { data: fileData, error: fileError } = await window.supabase.storage
      .from('documents')
      .upload(fileName, file);

// Handle logo upload
const handleLogoUpload = async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const handleThemeToggle = (theme) => {
  const isDark = theme === 'Dark Mode';
  setDarkMode(isDark);
  if (isDark) {
    document.documentElement.classList.add('dark');
  } else {
    document.documentElement.classList.remove('dark');
  }
  localStorage.setItem('darkMode', isDark.toString());
};
  
  try {
    // Delete old logo if exists
    const { data: existingFiles } = await window.supabase.storage
      .from('logo')
      .list();
    
    if (existingFiles && existingFiles.length > 0) {
      await window.supabase.storage
        .from('logo')
        .remove(existingFiles.map(f => f.name));
    }
    
    // Upload new logo
    const fileName = `company-logo.${file.name.split('.').pop()}`;
    const { data, error } = await window.supabase.storage
      .from('logo')
      .upload(fileName, file, { upsert: true });
    
    if (error) throw error;
    
    // Get public URL
    const { data: { publicUrl } } = window.supabase.storage
      .from('logo')
      .getPublicUrl(fileName);
    
    setLogo(publicUrl);
    localStorage.setItem('companyLogo', publicUrl); // Keep local cache
    alert('Logo uploaded successfully!');
  } catch (error) {
    console.error('Error:', error);
    alert('Error uploading logo');
  }
};

// Load Sage settings
useEffect(() => {
  const loadSageSettings = async () => {
    try {
      const { data } = await window.supabase
        .from('company_settings')
        .select('*')
        .in('setting_name', ['sage_client_id', 'sage_client_secret', 'sage_access_token', 
                             'sage_refresh_token', 'sage_company_id', 'sage_api_region', 
                             'sage_last_sync']);
      
      if (data) {
        const settings = {};
        data.forEach(item => {
          const key = item.setting_name.replace('sage_', '');
          if (key === 'client_id') settings.clientId = item.setting_value;
          else if (key === 'client_secret') settings.clientSecret = item.setting_value;
          else if (key === 'access_token') settings.accessToken = item.setting_value;
          else if (key === 'refresh_token') settings.refreshToken = item.setting_value;
          else if (key === 'company_id') settings.companyId = item.setting_value;
          else if (key === 'api_region') settings.apiRegion = item.setting_value;
          else if (key === 'last_sync') settings.lastSync = item.setting_value;
        });
        // If a valid access token exists in DB, mark as connected in localStorage
        // This fixes the issue where localStorage is cleared but DB still has tokens
        if (settings.accessToken) {
          localStorage.setItem('sage_connected', 'true');
        }
        setSageSettings(prev => ({ ...prev, ...settings }));
      }
    } catch (error) {
      console.error('Error loading Sage settings:', error);
    }
  };
  loadSageSettings();
}, []);

    loadDocuments();
  }, []);

    // Filter and sort documents whenever documents, search or sort changes
    let filtered = documents.filter(doc => 
      (doc.name || '').toLowerCase().includes(searchQuery.toLowerCase())
    );

    // Sort documents
    filtered.sort((a, b) => {
      if (sortBy === 'date') {
        return new Date(b.created_at) - new Date(a.created_at);
      } else if (sortBy === 'name') {
        return (a.name || '').localeCompare(b.name || '');
      }
      return 0;
    });

    setFilteredDocuments(filtered);
  }, [documents, searchQuery, sortBy]);

  const loadDocuments = async () => {
    try {
      setLoading(true);
      const { data, error } = await window.supabase
        .from('documents')
        .select('*')
        .order('created_at', { ascending: false });
      
      if (error) {
        console.error('Error loading documents:', error);
        return;
      }
      
      setDocuments(data || []);
    } catch (error) {
      console.error('Error:', error);
    } finally {
      setLoading(false);
    }
  };

    const docTitle = document.getElementById('doc-title')?.value;
    const fileInput = document.getElementById('doc-file');
    const file = fileInput?.files[0];

      alert('Please provide a title and select a file');
      return;
    }
    
    try {
      const fileName = `${Date.now()}_${file.name}`;
      const { data: fileData, error: fileError } = await window.supabase.storage
        .from('documents')
        .upload(fileName, file);
      
      if (fileError) throw fileError;
      
      const { data: { publicUrl } } = window.supabase.storage
        .from('documents')
        .getPublicUrl(fileName);
      
      const { data, error } = await window.supabase
        .from('documents')
        .insert([{
          name: docTitle,
          category: 'policies', // Default category since we removed the selector
          file_type: 'policies',
          file_path: fileName,
          file_url: publicUrl,
          file_size: file.size
        }])
        .select();
      
      if (error) throw error;
      
      alert('Document uploaded successfully!');
      document.getElementById('doc-title').value = '';
      document.getElementById('doc-file').value = '';
      loadDocuments();

      console.error('Error:', error);
      alert('Error: ' + error.message);

        .eq('id', docId);

                >
                  <svg className="w-5 h-5 mr-2" fill="currentColor" viewBox="0 0 20 20">
                    <path d="M11 3a1 1 0 100 2h2.586l-6.293 6.293a1 1 0 101.414 1.414L15 6.414V9a1 1 0 102 0V4a1 1 0 00-1-1h-5z"/>
                    <path d="M5 5a2 2 0 00-2 2v8a2 2 0 002 2h8a2 2 0 002-2v-3a1 1 0 10-2 0v3H5V7h3a1 1 0 000-2H5z"/>
                  </svg>
                  Open Suppliers List in Google Sheets
                </a>
              </div>
            </div>
          </div>
        </div>
      )}
      
      {/* Search and Sort controls */}
      <div className="mb-6 flex gap-4 items-center">
        <div className="flex-1 max-w-md">
          <input
            type="text"
            placeholder="Search documents..."
            value={searchQuery}
            onChange={(e) => setSearchQuery(e.target.value)}
            className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500"
          />
        </div>
        <select
          value={sortBy}
          onChange={(e) => setSortBy(e.target.value)}
          className="px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500"
        >
          <option value="date">Sort by Date</option>
          <option value="name">Sort by Name</option>
        </select>
      </div>
      
      {loading ? (
        <div className="text-center py-8">
          <Loader className="mx-auto h-8 w-8 animate-spin text-blue-500" />
          <p className="mt-2 text-gray-500">Loading documents...</p>
        </div>
      ) : (
        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
          {filteredDocuments.length === 0 ? (
            <div className="col-span-full text-center py-8 text-gray-500">
              {searchQuery ? 'No documents found matching your search' : 'No documents uploaded yet'}
            </div>
          ) : (
            filteredDocuments.map(doc => (
              <div key={doc.id} className="border rounded-lg p-4 hover:shadow-lg transition-shadow">
                <h4 className="font-semibold">{doc.name || 'Untitled'}</h4>
                <p className="text-sm text-gray-600">Uploaded: {new Date(doc.created_at).toLocaleDateString()}</p>
                <div className="mt-2 flex gap-2">
                  <a 
                    href={doc.file_url} 
                    target="_blank" 
                    rel="noopener noreferrer"
                    className="text-blue-500 hover:text-blue-700"
                  >
                    View/Download
                  </a>
                  {user?.role === 'ADMIN' && (
                    <button 
                      onClick={() => deleteDocument(doc.id)}
                      className="text-red-500 hover:text-red-700"
                    >
                      Delete
                    </button>
                  )}
                </div>
              </div>
            ))
          )}
        </div>
      )}
    </div>
  );
};

// ─── Customer Portal Admin View ────────────────────────────────────────────
const CustomerPortalAdmin = ({ jobs, customers }) => {
  const [credentials, setCredentials] = useState({}); // { customerName: { pin, passcode } }
  const [portalPreviewCustomer, setPortalPreviewCustomer] = useState(null);
  const [portalSearch, setPortalSearch] = useState('');
  const [savedMsg, setSavedMsg] = useState('');
  const [expandedPreviewId, setExpandedPreviewId] = useState(null);
  const [wtnPreviewModal, setWtnPreviewModal] = useState(null);
  const [emailOverrides, setEmailOverrides] = useState({}); // { customerName: emailString }

  // Pre-fill with existing credentials from customer records
  React.useEffect(() => {
    const existing = {};
    customers.forEach(c => {
      const name = c.company_name || c.name;
      if (c.portal_pin || c.portal_passcode) {
        existing[name] = { pin: c.portal_pin || '', passcode: c.portal_passcode || '' };
      }
    });
    setCredentials(existing);
  }, [customers]);

  const generateCredentials = (customerName) => {
    const pin = String(Math.floor(1000 + Math.random() * 9000));
    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789';
    const passcode = Array.from({length: 8}, () => chars[Math.floor(Math.random() * chars.length)]).join('');
    setCredentials(prev => ({ ...prev, [customerName]: { pin, passcode } }));
  };

  const saveCredentials = async (customerName) => {
    const creds = credentials[customerName];
    if (!creds?.pin || !creds?.passcode) { alert('Generate credentials first.'); return; }
    try {
      const updateData = { portal_pin: creds.pin, portal_passcode: creds.passcode };
      // Also save email override if set
      const emailOverride = emailOverrides[customerName];
      if (emailOverride) updateData.email = emailOverride;
      const { error } = await window.supabase
        .from('customers')
        .update(updateData)
        .eq('name', customerName);
      if (error) throw error;
      setSavedMsg(`✅ Credentials saved for ${customerName}`);
      setTimeout(() => setSavedMsg(''), 3000);
    } catch (err) {
      alert('Error saving credentials: ' + err.message);
    }
  };

  const saveEmailOnly = async (customerName, email) => {
    try {
      const { error } = await window.supabase
        .from('customers')
        .update({ email })
        .eq('name', customerName);
      if (error) throw error;
      setSavedMsg(`✅ Email saved for ${customerName}`);
      setTimeout(() => setSavedMsg(''), 2000);
    } catch (err) {
      console.error('Error saving email:', err);
    }
  };

  const sendCredentialsByEmail = async (customerName, pin, passcode) => {
    const cust = customers.find(c => (c.company_name || c.name || c.companyName) === customerName);
    const email = cust?.email || '';
    if (!email) { alert(`No email address for ${customerName}. Enter one in the Email field (click away to save) then try again.`); return; }
    if (!pin || !passcode) { alert('Please generate and save credentials first.'); return; }
    // Use configured portal URL from settings, or current location if hosted, or placeholder if local file
    const isLocalFile = window.location.protocol === 'file:';
    const configuredUrl = localStorage.getItem('portalUrl') || '';
    const portalUrl = configuredUrl || (isLocalFile ? 'https://portal.totalwasteservicesltd.com' : window.location.origin + window.location.pathname);
    const emailBody = `Dear ${customerName},

Welcome to the Total Waste Services customer portal. You can now log in to view your jobs and download Waste Transfer Notes.

━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
YOUR PORTAL LOGIN CREDENTIALS
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

Portal URL:  ${portalUrl}
PIN:         ${pin}
Passcode:    ${passcode}

To log in:
1. Go to the portal URL above
2. Click "Customer Portal"
3. Enter your 4-digit PIN and passcode
4. View your jobs and download Waste Transfer Notes

Please keep these credentials safe. If you have any issues accessing the portal, please contact us at info@totalwasteservicesltd.com or call us directly.

━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

Kind regards,
Total Waste Services Ltd
info@totalwasteservicesltd.com`;

    try {
      await emailjs.send('service_mmqyuum', 'template_rol3o4h', {
        wtn_number: 'Portal Access',
        customer_name: customerName,
        email: email,
        name: customerName,
        message: emailBody,
      });
      setSavedMsg(`✅ Credentials emailed to ${email}`);
      setTimeout(() => setSavedMsg(''), 4000);
    } catch(err) {
      alert('Failed to send email: ' + (err.text || err.message || JSON.stringify(err)));
    }
  };

  const copyToClipboard = (text) => { try { navigator.clipboard.writeText(text); } catch(e) {} };

  // Portal preview for a specific customer
  if (portalPreviewCustomer) {
    const portalJobs = jobs.filter(j => j.customerName === portalPreviewCustomer);
    const completed = portalJobs.filter(j => j.isCompleted || j.status === 'COLLECTED' || j.status === 'COMPLETED');
    const inProgress = portalJobs.filter(j => !j.isCompleted && j.status !== 'COLLECTED' && !j.isCancelled);

    const downloadWTN = (job) => {
      // Convert camelCase job to snake_case format WtnPortalModal expects
      const normalized = {
        ...job,
        job_number: job.jobNumber || job.job_number,
        customer_name: job.customerName || job.customer_name,
        wtn_data: job.wtnData ? JSON.stringify(job.wtnData) : job.wtn_data,
      };
      setWtnPreviewModal(normalized);
    };

    return (
      <React.Fragment>
      <div>
        <div className="flex items-center gap-3 mb-6">
          <button onClick={() => setPortalPreviewCustomer(null)}
            className="px-3 py-2 border border-gray-300 rounded-lg text-sm text-gray-600 hover:bg-gray-50">
            ← Back to Portal Management
          </button>
          <h2 className="font-bold text-gray-800">Previewing portal for: <span className="text-blue-700">{portalPreviewCustomer}</span></h2>
        </div>

        <div className="bg-green-700 text-white px-6 py-4 rounded-xl mb-4 flex items-center gap-4">
          {localStorage.getItem('companyLogo')
            ? <img src={localStorage.getItem('companyLogo')} className="h-12 object-contain" alt="logo" />
            : <div className="w-10 h-10 bg-white rounded-full flex items-center justify-center"><LucideIcon icon="Recycle" size={18} className="text-green-700" /></div>}
          <div>
            <div className="font-bold">{localStorage.getItem('companyName') || 'Total Waste Services'} — Customer Portal</div>
            <div className="text-green-200 text-xs">{portalPreviewCustomer}</div>
          </div>
        </div>

        <div className="grid grid-cols-3 gap-4 mb-6">
          {[
            { label: 'Total Jobs', val: portalJobs.length, color: 'blue' },
            { label: 'Completed', val: completed.length, color: 'green' },
            { label: 'Scheduled', val: inProgress.length, color: 'orange' },
          ].map(({ label, val, color }) => (
            <div key={label} className="bg-white rounded-xl border border-gray-200 p-4 text-center">
              <div className={`text-3xl font-bold text-${color}-600`}>{val}</div>
              <div className="text-sm text-gray-500 mt-1">{label}</div>
            </div>
          ))}
        </div>

        <div className="bg-white rounded-xl border border-gray-200 overflow-hidden">
          <div className="bg-gray-50 px-4 py-3 border-b font-semibold text-gray-800 text-sm">Jobs (as customer sees it)</div>
          <div className="overflow-x-auto">
            <table className="w-full text-sm">
              <thead className="bg-gray-50 text-xs text-gray-500 uppercase">
                <tr>
                  <th className="px-4 py-3 text-left">Job #</th>
                  <th className="px-4 py-3 text-left">Date</th>
                  <th className="px-4 py-3 text-left">Service</th>
                  <th className="px-4 py-3 text-left">Site</th>
                  <th className="px-4 py-3 text-left">Price (ex VAT)</th>
                  <th className="px-4 py-3 text-left">Status</th>
                  <th className="px-4 py-3 text-left">Documents</th>
                </tr>
              </thead>
              <tbody className="divide-y divide-gray-100">
                {portalJobs.length === 0 ? (
                  <tr><td colSpan={7} className="px-4 py-8 text-center text-gray-400">No jobs for this customer.</td></tr>
                ) : portalJobs.map(job => {
                  const done = job.isCompleted || job.status === 'COLLECTED' || job.status === 'COMPLETED';
                  const isWasteJob = ['Skip Hire','Roll-on Roll-off','Muck Away','Grab Hire'].includes(job.jobType);
                  const isExpanded = expandedPreviewId === job.id;
                  // Read price from line items first (where Sage prices live)
                  const lineItems = (() => { try { return Array.isArray(job.lineItems) ? job.lineItems : (typeof job.lineItems === 'string' ? JSON.parse(job.lineItems) : []); } catch(e) { return []; } })();
                  const lineItemsTotal = lineItems.reduce((sum, item) => {
                    const rrp = parseFloat(item.customer_price || item.unit_price || 0);
                    const qty = parseFloat(item.quantity || 1);
                    return sum + (rrp * qty);
                  }, 0);
                  const finalPrice = parseFloat(job.customerFinalPrice) || 0;
                  const unitPrice = parseFloat(job.customerUnitPrice) || 0;
                  const jobQty = parseFloat(job.quantity) || 1;
                  const jobValue = parseFloat(job.jobValue) || 0;
                  const bestPrice = finalPrice > 0 ? finalPrice
                    : lineItemsTotal > 0 ? lineItemsTotal
                    : unitPrice > 0 ? unitPrice * jobQty
                    : jobValue > 0 ? jobValue
                    : null;
                  const displayPrice = bestPrice != null ? `£${bestPrice.toFixed(2)}` : 'POA';
                  const serviceDetail = job.wasteType || job.aggregateType || null;
                  const qty = job.quantity ? `${job.quantity} ${job.unit || ''}`.trim() : null;
                  return (
                    <React.Fragment key={job.id}>
                    <tr className={`cursor-pointer transition-colors ${isExpanded ? 'bg-green-50' : 'hover:bg-gray-50'}`}
                      onClick={() => setExpandedPreviewId(isExpanded ? null : job.id)}>
                      <td className="px-4 py-3 font-mono font-medium text-blue-700 text-xs">
                        <span className={`text-gray-400 mr-1 inline-block transition-transform ${isExpanded?'rotate-90':''}`}>▶</span>{job.jobNumber}
                      </td>
                      <td className="px-4 py-3 text-gray-600 text-xs">{job.jobDate ? new Date(job.jobDate).toLocaleDateString('en-GB') : '—'}</td>
                      <td className="px-4 py-3 text-xs">
                        <div className="font-medium">{job.jobType}</div>
                        {serviceDetail && <div className="text-gray-400">{serviceDetail}</div>}
                        {qty && <div className="text-gray-400">Qty: {qty}</div>}
                      </td>
                      <td className="px-4 py-3 text-xs text-gray-500">{[job.siteAddress1, job.sitePostcode].filter(Boolean).join(', ') || '—'}</td>
                      <td className="px-4 py-3 font-medium text-xs">{displayPrice}</td>
                      <td className="px-4 py-3">
                        <span className={`px-2 py-1 rounded-full text-xs font-medium ${done ? 'bg-green-100 text-green-700' : job.isCancelled ? 'bg-red-100 text-red-700' : 'bg-blue-100 text-blue-700'}`}>
                          {done ? 'Completed' : job.isCancelled ? 'Cancelled' : 'Scheduled'}
                        </span>
                      </td>
                      <td className="px-4 py-3 text-xs">
                        {done && isWasteJob && (job.wtnSent || job.wtn_sent)
                          ? <button onClick={() => downloadWTN(job)} className="text-green-700 hover:text-green-900 font-medium">📄 Waste Transfer Note</button>
                          : done && isWasteJob
                          ? <span className="text-gray-400">WTN pending</span>
                          : <span className="text-gray-300">—</span>}
                      </td>
                    </tr>
                    {isExpanded && (
                      <tr className="bg-green-50">
                        <td colSpan={7} className="px-8 py-4 border-t border-green-100">
                          <div className="grid grid-cols-2 sm:grid-cols-3 gap-4 text-xs">
                            <div><div className="text-gray-400 uppercase tracking-wide mb-1">Job Reference</div><div className="font-semibold">{job.jobNumber}</div></div>
                            <div><div className="text-gray-400 uppercase tracking-wide mb-1">Service</div><div className="font-semibold">{job.jobType}</div></div>
                            <div><div className="text-gray-400 uppercase tracking-wide mb-1">Status</div><div className="font-semibold">{done?'Completed':job.isCancelled?'Cancelled':'Scheduled'}</div></div>
                            <div><div className="text-gray-400 uppercase tracking-wide mb-1">Date</div><div className="font-semibold">{job.jobDate ? new Date(job.jobDate).toLocaleDateString('en-GB') : '—'}</div></div>
                            <div><div className="text-gray-400 uppercase tracking-wide mb-1">Site</div><div className="font-semibold">{[job.siteAddress1, job.siteCity, job.sitePostcode].filter(Boolean).join(', ') || '—'}</div></div>
                            {qty && <div><div className="text-gray-400 uppercase tracking-wide mb-1">Quantity</div><div className="font-semibold">{qty}</div></div>}
                            <div><div className="text-gray-400 uppercase tracking-wide mb-1">Price (ex VAT)</div><div className="font-semibold text-green-700">{displayPrice}</div></div>
                            <div><div className="text-gray-400 uppercase tracking-wide mb-1">VAT (20%)</div><div className="font-semibold">{bestPrice ? `£${(bestPrice*0.2).toFixed(2)}` : '—'}</div></div>
                            <div><div className="text-gray-400 uppercase tracking-wide mb-1">Total (inc VAT)</div><div className="font-bold">{bestPrice ? `£${(bestPrice*1.2).toFixed(2)}` : '—'}</div></div>
                            {lineItems.length > 0 && (
                              <div className="col-span-2 sm:col-span-3">
                                <div className="text-gray-400 uppercase tracking-wide mb-2">Products & Services</div>
                                <table className="w-full text-xs border border-gray-200 rounded">
                                  <thead className="bg-gray-50"><tr>
                                    <th className="px-3 py-2 text-left text-gray-500">Product / Service</th>
                                    <th className="px-3 py-2 text-right text-gray-500">Qty</th>
                                    <th className="px-3 py-2 text-right text-gray-500">Unit Price</th>
                                    <th className="px-3 py-2 text-right text-gray-500">Total</th>
                                  </tr></thead>
                                  <tbody className="divide-y divide-gray-100">
                                    {lineItems.map((item, i) => {
                                      const rrp = parseFloat(item.customer_price || item.unit_price || 0);
                                      const q = parseFloat(item.quantity || 1);
                                      return <tr key={i}>
                                        <td className="px-3 py-2 font-medium">{item.product_name || item.description || '—'}</td>
                                        <td className="px-3 py-2 text-right text-gray-600">{q}</td>
                                        <td className="px-3 py-2 text-right text-gray-600">£{rrp.toFixed(2)}</td>
                                        <td className="px-3 py-2 text-right font-semibold">£{(rrp*q).toFixed(2)}</td>
                                      </tr>;
                                    })}
                                  </tbody>
                                </table>
                              </div>
                            )}
                          </div>
                        </td>
                      </tr>
                    )}
                    </React.Fragment>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      </div>
      {wtnPreviewModal && <WtnPortalModal job={wtnPreviewModal} onClose={() => setWtnPreviewModal(null)} />}
    </React.Fragment>
    );
  }

  // ── Main admin management view ──
  return (
    <div className="space-y-6">
      <div className="bg-white rounded-xl border border-gray-200 p-6">
        <div className="mb-4 flex items-start justify-between">
          <div>
            <h2 className="text-xl font-bold text-gray-900">Customer Portal Access</h2>
            <p className="text-gray-500 text-sm mt-1">Generate a PIN and passcode for each customer. Share both with them to log in — no company name needed.</p>
          </div>
          {savedMsg && <div className="text-green-700 bg-green-50 border border-green-200 px-3 py-2 rounded-lg text-sm font-medium">{savedMsg}</div>}
        </div>

        <div className="mb-4">
          <input type="text" placeholder="🔍 Search customers..." value={portalSearch}
            onChange={e => setPortalSearch(e.target.value)}
            className="w-full sm:w-80 px-4 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-green-500" />
        </div>

        <div className="overflow-x-auto">
          <table className="w-full text-sm">
            <thead className="bg-gray-50 text-xs text-gray-500 uppercase">
              <tr>
                <th className="px-4 py-3 text-left">Customer</th>
                <th className="px-4 py-3 text-left">Jobs</th>
                <th className="px-4 py-3 text-left">Portal Email</th>
                <th className="px-4 py-3 text-left">4-Digit PIN</th>
                <th className="px-4 py-3 text-left">Passcode</th>
                <th className="px-4 py-3 text-left">Actions</th>
              </tr>
            </thead>
            <tbody className="divide-y divide-gray-100">
              {customers.length === 0 ? (
                <tr><td colSpan={6} className="px-4 py-8 text-center text-gray-400">No customers found.</td></tr>
              ) : customers.filter(c => {
                const name = (c.companyName || c.name || c.company_name || '').toLowerCase();
                return !portalSearch || name.includes(portalSearch.toLowerCase());
              }).map(customer => {
                const cName = customer.companyName || customer.name || customer.company_name;
                const cJobs = jobs.filter(j => j.customerName === cName);
                const creds = credentials[cName];
                const hasExisting = customer.portal_pin && customer.portal_passcode;
                return (
                  <tr key={customer.id} className="hover:bg-gray-50">
                    <td className="px-4 py-3 font-medium text-gray-900">{cName}</td>
                    <td className="px-4 py-3 text-gray-500">{cJobs.length}</td>
                    <td className="px-4 py-3">
                      <div className="flex items-center gap-1">
                        <input
                          type="email"
                          defaultValue={customer.email || ''}
                          onBlur={async (e) => {
                            const newEmail = e.target.value.trim();
                            if (newEmail && newEmail !== customer.email) {
                              try {
                                await window.supabase.from('customers').update({ email: newEmail }).eq('name', cName);
                                customer.email = newEmail; // update local ref
                                setSavedMsg(`✅ Email saved for ${cName}`);
                                setTimeout(() => setSavedMsg(''), 2000);
                              } catch(err) { console.error('Email save error:', err); }
                            }
                          }}
                          placeholder="customer@email.com"
                          className="w-48 px-2 py-1.5 border border-gray-300 rounded-lg text-xs focus:outline-none focus:ring-2 focus:ring-green-500"
                        />
                      </div>
                    </td>
                    <td className="px-4 py-3">
                      {creds?.pin
                        ? <span className="font-mono font-bold text-green-700 bg-green-50 px-3 py-1 rounded-lg border border-green-200 tracking-widest">{creds.pin}</span>
                        : hasExisting
                          ? <span className="font-mono text-gray-500 bg-gray-50 px-3 py-1 rounded-lg border border-gray-200 tracking-widest">{customer.portal_pin}</span>
                          : <span className="text-gray-400 text-xs italic">Not set</span>}
                    </td>
                    <td className="px-4 py-3">
                      {creds?.passcode
                        ? <div className="flex items-center gap-2">
                            <span className="font-mono font-bold text-green-700 bg-green-50 px-3 py-1 rounded-lg border border-green-200">{creds.passcode}</span>
                            <button onClick={() => copyToClipboard(creds.passcode)} className="text-gray-400 hover:text-gray-600 text-xs" title="Copy">📋</button>
                          </div>
                        : hasExisting
                          ? <span className="font-mono text-gray-400 bg-gray-50 px-3 py-1 rounded-lg border border-gray-200">••••••••</span>
                          : <span className="text-gray-400 text-xs italic">Not set</span>}
                    </td>
                    <td className="px-4 py-3">
                      <div className="flex gap-2 flex-wrap">

                          </button>
                        )}

                          className="px-3 py-1.5 bg-gray-100 text-gray-700 border border-gray-200 rounded-lg text-xs font-medium hover:bg-gray-200">
                          👁 Preview
                        </button>
                        {(creds || hasExisting) && (
                          <button onClick={() => {
                            const pin = creds?.pin || customer.portal_pin;
                            const pass = creds?.passcode || '(see saved passcode)';
                            copyToClipboard(`Your Total Waste Services portal credentials:\nPIN: ${pin}\nPasscode: ${pass}\nPortal: portal.totalwasteservicesltd.com`);

  const checkRecurringJobs = async () => {
    // Prevent concurrent runs
    if (window._recurringJobsRunning) return;
    window._recurringJobsRunning = true;
    try {
      const today = new Date().toISOString().split('T')[0];
      const { data: recurringJobs, error } = await window.supabase
        .from('jobs')
        .select('*')
        .eq('is_recurring', true)
        .lte('recurring_next_date', today)
        .eq('is_cancelled', false);

      if (error || !recurringJobs || recurringJobs.length === 0) return;

      for (const rj of recurringJobs) {
        // Check end date
        if (rj.recurring_end_date && rj.recurring_next_date > rj.recurring_end_date) continue;

        // Calculate the NEXT occurrence after creating this one
        const nextDate = new Date(rj.recurring_next_date);
        const freq = rj.recurring_frequency || 'weekly';
        if (freq === 'daily') nextDate.setDate(nextDate.getDate() + 1);
        else if (freq === 'weekly') nextDate.setDate(nextDate.getDate() + 7);
        else if (freq === 'fortnightly') nextDate.setDate(nextDate.getDate() + 14);
        else if (freq === 'monthly') nextDate.setMonth(nextDate.getMonth() + 1);

            const parts = (j.job_number || '').split('-');

          newJobNumber = `TWS-${maxNum + 1}`;

          wtn_sent: false,             // always false on new child — parent's sent status must not bleed through
          wtn_sent_at: null,
          wtn_recurring: false,        // child never triggers its own WTN schedule
          wtn_recurring_frequency: null,
          wtn_recurring_next_date: null,
          parent_job_id: rj.id,
        };

        // Guard: check if a child job for this parent already exists for this scheduled date
        // Prevents duplicates when checkRecurringJobs fires multiple times in one session
        const scheduledDate = rj.recurring_next_date;
        const { data: existingJobs } = await window.supabase
          .from('jobs')
          .select('id')
          .eq('parent_job_id', rj.id)
          .eq('job_date', today)
          .ilike('notes', `%scheduled ${new Date(scheduledDate).toLocaleDateString('en-GB')}%`);

        if (existingJobs && existingJobs.length > 0) {
          // Job already created for this occurrence — just make sure next_date is advanced
          await window.supabase.from('jobs').update({ recurring_next_date: nextDateStr }).eq('id', rj.id);
          continue;
        }

        const { error: insertError } = await window.supabase.from('jobs').insert([newJob]);
        if (insertError) { console.error('Error creating recurring job:', insertError); continue; }

        // Advance the next-due date on the template job
        await window.supabase.from('jobs').update({ recurring_next_date: nextDateStr }).eq('id', rj.id);

        const msg = `🔁 Recurring job created: ${newJobNumber} for ${rj.customer_name} (${freq} — job date ${new Date(rj.recurring_next_date).toLocaleDateString('en-GB')}, next due ${new Date(nextDateStr).toLocaleDateString('en-GB')})`;
        setRecurringNotifications(prev => [...prev, msg]);
      }

      // Small delay to ensure Supabase has committed all inserts, then reload fresh
      await new Promise(resolve => setTimeout(resolve, 500));
      await window.loadJobsFromSupabase();

    } catch (err) {
      console.error('Recurring job checker error:', err);
    } finally {
      window._recurringJobsRunning = false;
    }
  };

  checkRecurringJobs();
  window.checkRecurringJobs = checkRecurringJobs;

  // Recurring WTN checker — inline so it's in scope
  const checkRecurringWtnsInline = async () => {
    try {
      const today = new Date().toISOString().split('T')[0];
      const { data: dueJobs, error } = await window.supabase
        .from('jobs')
        .select('*')
        .eq('wtn_recurring', true)
        .lte('wtn_recurring_next_date', today);

      if (error || !dueJobs || dueJobs.length === 0) return;

      for (const rj of dueJobs) {
        if (!rj.wtn_recipient) continue;
        const body = `Dear Customer,\n\nYour scheduled Waste Transfer Note for job ${rj.job_number} is due.\n\nJob Reference: ${rj.job_number}\nCustomer: ${rj.customer_name}\nJob Type: ${rj.job_type}\nSite: ${[rj.site_address1, rj.site_postcode].filter(Boolean).join(', ')}\n\nThis WTN is issued under the Environmental Protection Act 1990 s.34 and the Waste (England & Wales) Regulations 2011. Please retain for a minimum of 2 years.\n\nKind regards,\nTotal Waste Services Ltd\ninfo@totalwasteservicesltd.com`;

        try {
          await emailjs.send('service_mmqyuum', 'template_rol3o4h', {
            wtn_number: `WTN-${rj.job_number}-RECURRING`,
            customer_name: rj.customer_name,
            email: rj.wtn_recipient,
            name: rj.customer_name,
            message: body,
          });
          const nextDate = new Date(rj.wtn_recurring_next_date);
          if (rj.wtn_recurring_frequency === 'monthly') nextDate.setMonth(nextDate.getMonth() + 1);
          else nextDate.setFullYear(nextDate.getFullYear() + 1);
          await window.supabase.from('jobs').update({
            wtn_recurring_next_date: nextDate.toISOString().split('T')[0],
            wtn_sent_at: new Date().toISOString(),
          }).eq('id', rj.id);
          setRecurringNotifications(prev => [...prev, `📄 Recurring WTN sent to ${rj.customer_name} (${rj.job_number}) — next due ${nextDate.toLocaleDateString('en-GB')}`]);
        } catch(emailErr) {
          console.error('Recurring WTN send failed:', rj.job_number, emailErr);
        }
      }
    } catch (err) {
      console.error('Recurring WTN checker error:', err);
    }
  };
  checkRecurringWtnsInline();

  // Auto-refresh jobs every 30 seconds in the background
  const autoRefreshInterval = setInterval(async () => {
    try {
      await window.loadJobsFromSupabase();
    } catch(e) {
      // Silent fail
    }
  }, 30000);

  // Re-run recurring job checker every 5 minutes so new recurring jobs
  // created mid-session fire without needing a logout/login
  const recurringCheckInterval = setInterval(async () => {
    try {
      await checkRecurringJobs();
      await checkRecurringWtnsInline();
    } catch(e) {
      // Silent fail
    }
  }, 5 * 60 * 1000);

  // Also run checker when the tab becomes visible again (e.g. opening laptop,
  // switching back to the tab after overnight) — intervals pause when suspended
  const handleVisibilityChange = async () => {
    if (document.visibilityState === 'visible') {
      try {
        await checkRecurringJobs();
        await checkRecurringWtnsInline();
        await window.loadJobsFromSupabase();
      } catch(e) { /* silent */ }
    }
  };
  document.addEventListener('visibilitychange', handleVisibilityChange);

  const autoRefreshCleanup = () => {
    clearInterval(autoRefreshInterval);
    clearInterval(recurringCheckInterval);
    document.removeEventListener('visibilitychange', handleVisibilityChange);
  };
  return autoRefreshCleanup;
}, []); // end startup useEffect

      site_phone: newJob.sitePhone || null,
      site_notes: newJob.siteNotes || null,

      is_recurring: newJob.isRecurring || false,
      recurring_frequency: newJob.recurringFrequency || null,
      recurring_start_date: newJob.recurringStartDate || null,
      recurring_end_date: newJob.recurringEndDate || null,
      recurring_next_date: newJob.isRecurring ? (newJob.recurringStartDate || null) : null,
      sage_line_items: newJob.sage_line_items || null,
      wtn_data: newJob.wtnData ? JSON.stringify(newJob.wtnData) : null,
    };

    // Remove id field if invalid
    if (!jobForDatabase.id || jobForDatabase.id === 'undefined' || jobForDatabase.id === 'null') {
      delete jobForDatabase.id;
    }

    const { data, error } = await window.supabase
      .from('jobs')
      .insert([jobForDatabase])
      .select();

    if (error) throw error;

    // Use the returned data which includes the generated UUID
    const savedJob = {
      ...newJob,
      id: data[0].id,
      createdDate: data[0].created_at  // Store the created_at timestamp
    };

    // Add to local jobs state with the proper ID
    setJobs(prevJobs => [savedJob, ...prevJobs]);
    setShowJobForm(false);
    setEditingJob(null);
    // If this is a recurring job, run the checker immediately so child jobs
    // due today are created right away without needing a logout/login
    if (newJob.isRecurring && window.checkRecurringJobs) {
      setTimeout(() => window.checkRecurringJobs(), 500);

};

const handleCompleteJob = async (job) => {
  try {
    const updateData = {
      is_completed: true,
      status: 'COMPLETED'
    };
    
    const { error } = await window.supabase
      .from('jobs')
      .update(updateData)
      .eq('id', job.id);
    
    if (error) throw error;
    
    // Re-fetch from DB to get the definitive updated record
    const { data: freshJob } = await window.supabase
      .from('jobs').select('*').eq('id', job.id).single();

    const updatedJob = {
      ...(freshJob || job),
      // Ensure camelCase fields are set
      jobNumber: (freshJob || job).job_number || job.jobNumber,
      jobDate: (freshJob || job).job_date || job.jobDate,
      customerName: (freshJob || job).customer_name || job.customerName,
      supplierName: (freshJob || job).supplier_name || job.supplierName,
      haulierName: (freshJob || job).haulier_name || job.haulierName,
      jobType: (freshJob || job).job_type || job.jobType,
      invoiceNumber: (freshJob || job).invoice_number || job.invoiceNumber,
      invoiceStatus: (freshJob || job).invoice_status || job.invoiceStatus,
      siteAddress1: (freshJob || job).site_address1 || job.siteAddress1,
      sitePostcode: (freshJob || job).site_postcode || job.sitePostcode,
      grossProfit: (freshJob || job).gross_profit ?? job.grossProfit,
      profitMargin: (freshJob || job).profit_margin ?? job.profitMargin,
      customerFinalPrice: (freshJob || job).customer_final_price ?? job.customerFinalPrice,
      supplierFinalPrice: (freshJob || job).supplier_final_price ?? job.supplierFinalPrice,
      lineItems: (() => {
        const raw = freshJob?.sage_line_items || job.lineItems;
        if (!raw) return [];
        if (Array.isArray(raw)) return raw;
        try { return JSON.parse(raw); } catch(e) { return []; }
      })(),
      isCompleted: true,
      is_completed: true,
      status: 'COMPLETED'
    };
    
    setJobs(jobs.map(j => j.id === job.id ? updatedJob : j));
    if (setShowFullPageJob) setShowFullPageJob(updatedJob);

    // Check if parent job has per-job recurring WTN enabled
    let parentJobData = null;
    if (job.parentJobId || job.parent_job_id) {
      const parentId = job.parentJobId || job.parent_job_id;
      const { data: parentJob } = await window.supabase
        .from('jobs')
        .select('*')
        .eq('id', parentId)
        .single();
      parentJobData = parentJob;

      // Only trigger per-job WTN from the PARENT job's settings, never the child's own fields
      // This prevents duplicates and ensures the schedule is managed in one place
      if (parentJobData?.wtn_recurring && parentJobData?.wtn_recurring_frequency === 'per-job' && parentJobData?.wtn_recipient) {
        const customerName = job.customerName || parentJobData.customer_name;
        const recipient = parentJobData.wtn_recipient;
        try {
          const parentWtnData = parentJobData.wtn_data
            ? (typeof parentJobData.wtn_data === 'string' ? JSON.parse(parentJobData.wtn_data) : parentJobData.wtn_data)
            : {};
          const wtnFields = {
            ...parentWtnData,
            // Update job-specific fields for this completion
            wtnNumber: `WTN-${job.jobNumber || job.job_number}`,
            transferDate: new Date().toISOString().split('T')[0],
            transferTime: new Date().toTimeString().slice(0,5),
            transferorName: customerName,
            transferorAddress: [job.siteAddress1 || job.site_address1, job.siteAddress2 || job.site_address2, job.siteCity || job.site_city, job.sitePostcode || job.site_postcode].filter(Boolean).join(', '),
            transferAddress: [job.siteAddress1 || job.site_address1, job.siteCity || job.site_city, job.sitePostcode || job.site_postcode].filter(Boolean).join(', '),
            recipientEmail: recipient,
            // Keep all other fields (EWC, CBDU, recycling %, carrier details) from parent template
          };

          const htmlBody = buildWtnHtml(wtnFields, {
            jobNumber: job.jobNumber || job.job_number,
            customerName,
            jobType: job.jobType || job.job_type,
            siteAddress1: job.siteAddress1 || job.site_address1,
            sitePostcode: job.sitePostcode || job.site_postcode,
          });

          await emailjs.send('service_mmqyuum', 'template_rol3o4h', {
            wtn_number: wtnFields.wtnNumber,
            customer_name: customerName,
            email: recipient,
            name: customerName,
            message: htmlBody,
          });

          // Mark this job as WTN sent in Supabase
          await window.supabase.from('jobs').update({
            wtn_sent: true,
            wtn_sent_at: new Date().toISOString(),
            wtn_recipient: recipient,
            wtn_data: JSON.stringify(wtnFields),
          }).eq('id', job.id);

          setRecurringNotifications(prev => [...prev, `📄 Full WTN auto-sent to ${recipient} on completion of ${job.jobNumber}`]);
        } catch(e) { console.error('Per-job completion WTN failed:', e); }
      }
    }

    // For waste jobs, prompt to send WTN — but only if auto-send didn't already handle it
    const jobTypeForCheck = job.jobType || job.job_type || updatedJob.jobType || updatedJob.job_type || '';
    const isWasteJob = ['Skip Hire','Roll-on Roll-off'].includes(jobTypeForCheck);
    const autoWtnFired = (job.parentJobId || job.parent_job_id) && parentJobData?.wtn_recurring && parentJobData?.wtn_recurring_frequency === 'per-job';
    if (isWasteJob && !autoWtnFired) {
      const sendNow = window.confirm(
        `✅ Job ${job.jobNumber} marked as completed!\n\n📄 Would you like to send a Waste Transfer Note to ${job.customerName} now?\n\nClick OK to open the WTN tab, or Cancel to skip.`
      );
      if (sendNow) {
        setEditingJob(updatedJob);
        setShowJobForm(true);
        setTimeout(() => {
          const wtnTabBtn = document.querySelector('[data-tab="wtn"]');
          if (wtnTabBtn) wtnTabBtn.click();
        }, 400);
      }
    } else {
      alert('Job marked as completed!');
    }
    
  } catch (error) {
    console.error('Error completing job:', error);
    alert('Error completing job: ' + error.message);
  }
};

  baseURL: 'https://api.sage.com/v3.1',
  
  async getAccessToken() {
    // In production, this would handle OAuth2 flow

  async getSettings() {
    try {
      const { data } = await window.supabase
        .from('company_settings')
        .select('*')
        .in('setting_name', ['sage_access_token', 'sage_refresh_token', 'sage_company_id', 'sage_api_region']);
      
      const settings = {};
      data?.forEach(item => {
        const key = item.setting_name.replace('sage_', '');
        settings[key] = item.setting_value;
      });
      return settings;
    } catch (error) {
      console.error('Error getting Sage settings:', error);
      return {};
    }

 async makeRequest(endpoint, method = 'GET', body = null) {
    // Get settings including business ID
    const settings = await this.getSettings();
    
    // Fetch the business ID from settings
    const { data: businessData } = await window.supabase
        .from('company_settings')
        .select('setting_value')
        .eq('setting_name', 'sage_business_id')
        .single();
    
    const businessId = businessData?.setting_value;
    
    const response = await fetch('/api/sage-proxy', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
        },
        body: JSON.stringify({
            endpoint: endpoint.startsWith('/') ? endpoint.substring(1) : endpoint,
            method,
            body,
            businessId // Include the business ID
        })
    });
    
    if (!response.ok) {
        const error = await response.json();
        throw new Error(error.error || `HTTP error! status: ${response.status}`);
    }
    
    return response.json();
},
  
  async refreshToken() {
    try {
      const settings = await this.getSettings();
      if (!settings.refreshToken) return false;
      
      const { data: credentials } = await window.supabase
        .from('company_settings')
        .select('*')
        .in('setting_name', ['sage_client_id', 'sage_client_secret']);
      
      const clientId = credentials.find(s => s.setting_name === 'sage_client_id')?.setting_value;
      const clientSecret = credentials.find(s => s.setting_name === 'sage_client_secret')?.setting_value;
      
      const response = await fetch('https://oauth.accounting.sage.com/token', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/x-www-form-urlencoded'
        },
        
        body: new URLSearchParams({
          grant_type: 'refresh_token',
          refresh_token: settings.refreshToken,
          client_id: clientId,
          client_secret: clientSecret
        })
      });
      
      if (!response.ok) return false;
      
      const tokens = await response.json();
      
      // Save new tokens
      await window.supabase
        .from('company_settings')
        .upsert([
          { setting_name: 'sage_access_token', setting_value: tokens.access_token },
          { setting_name: 'sage_refresh_token', setting_value: tokens.refresh_token }
        ], { onConflict: 'setting_name' });
      
      return true;
    } catch (error) {
      console.error('Token refresh failed:', error);
      return false;
    }
  },

async function checkPendingSageConnection() {

            try {

                    .from('company_settings')

                        { setting_name: 'sage_refresh_token', setting_value: refreshToken },
                        { setting_name: 'sage_connected', setting_value: 'true' }
                    ]);
                
                // Clean up temporary storage
                localStorage.removeItem('sage_temp_access_token');
                localStorage.removeItem('sage_temp_refresh_token');

    const { data: { publicUrl } } = window.supabase.storage
      .from('documents')
      .getPublicUrl(fileName);

    // Save to job_attachments table
    const { data, error } = await window.supabase
      .from('job_attachments')
      .insert([{
        job_id: selectedJob.id,
        file_name: file.name,
        file_url: publicUrl,
        file_type: attachmentType,
        file_size: file.size,
        uploaded_by: user?.email
      }]);

    if (error) throw error;

    alert('Job attachment uploaded successfully!');
    loadJobAttachments(selectedJob.id);
    
    // Clear the form
    document.getElementById('attachment-file').value = '';
  } catch (error) {
    console.error('Error uploading job attachment:', error);
    alert('Error uploading job attachment');
  }
};
// Load job attachments function
window.loadJobAttachments = async (jobId) => {
  try {
    const { data, error } = await window.supabase
      .from('job_attachments')
      .select('*')
      .eq('job_id', jobId)
      .order('uploaded_at', { ascending: false });

    if (error) throw error;

    setJobAttachments(data || []);
  } catch (error) {
    console.error('Error loading job attachments:', error);
    setJobAttachments([]);
  }
};
</script>

<script>
function connectToSagePopup() {
    const width = 600;
    const height = 700;
    const left = (window.screen.width - width) / 2;
    const top = (window.screen.height - height) / 2;
    
    const popup = window.open(
        '/api/sage-auth',
        'sage_oauth',
        `width=${width},height=${height},left=${left},top=${top}`
    );
    
    if (!popup) {
        alert('Please allow popups to connect to Sage');
        return;
    }
    
    const checkInterval = setInterval(() => {
        if (popup.closed) {
            clearInterval(checkInterval);
            checkPendingSageConnection();
        }
    }, 1000);
}

window.addEventListener('message', async (event) => {
    if (event.data.type === 'sage-oauth-complete') {
        console.log('Received OAuth tokens from popup');
        
        const { tokens } = event.data;
        const expiresAt = new Date(Date.now() + (tokens.expires_in * 1000)).toISOString();
        
        try {
            // Update each setting individually with proper upsert
            const settings = [
                { setting_name: 'sage_access_token', setting_value: tokens.access_token },
                { setting_name: 'sage_refresh_token', setting_value: tokens.refresh_token },
                { setting_name: 'sage_token_expires_at', setting_value: expiresAt },
                { setting_name: 'sage_connected', setting_value: 'true' }
            ];
            
            for (const setting of settings) {
                const { error } = await window.supabase
                    .from('company_settings')
                    .upsert(setting, { 
                        onConflict: 'setting_name'
                    });
                
                if (error) {
                    console.error('Error upserting:', setting.setting_name, error);
                }
            }
            
            localStorage.setItem('sage_connected', 'true');
            alert('Successfully connected to Sage!');
            // Don't reload to avoid logout
            // window.location.reload();
            
        } catch (error) {
            console.error('Error saving tokens:', error);
            alert('Error saving Sage connection. Please try again.');
        }
    } else if (event.data.type === 'sage-oauth-error') {
        console.error('OAuth error:', event.data.error);
        alert(`Failed to connect to Sage: ${event.data.error}`);
    }
});
</script>
